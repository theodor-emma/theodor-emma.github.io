<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faire-part de Mariage — Theodor &amp; Emma</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="lang-switcher">
      <a href="index.html">English</a>
      <a href="ro.html">Română</a>
    </div>

    <p class="save-the-date">Faire-part de Mariage</p>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="names">
      Emma Chirlomez
      <span class="ampersand">&amp;</span>
      Theodor Moroianu
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="date-block">
      <p class="date-label">Vous invitent à leur mariage</p>
      <p class="date">Le samedi 7 août 2027</p>
    </div>

    <div class="church-block">
      <p class="venue-label">Cérémonie</p>
      <p class="venue-name">À confirmer</p>
    </div>

    <div class="venue-block">
      <p class="venue-label">Réception</p>
      <a class="venue-link" href="https://www.beauvoir-bourbonnais.fr/accs" target="_blank" rel="noopener">
        Château de Beauvoir, Bourbonnais, France
      </a>
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="countdown" id="countdown">
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-days">—</span>
        <span class="countdown-label">Jours</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-hours">—</span>
        <span class="countdown-label">Heures</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-minutes">—</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-seconds">—</span>
        <span class="countdown-label">Secondes</span>
      </div>
    </div>

    <div id="calendar-container"></div>

    <p class="formal-invitation">Invitation officielle à venir.</p>
  </div>

  <script>
    window.WEDDING_CONFIG = {
      labels: {
        addToCalendar:   'Ajouter au calendrier',
        googleCalendar:  'Google Agenda',
        appleOutlook:    'Apple / Outlook (.ics)',
        calendarDetails: 'Mariage de Emma Chirlomez & Theodor Moroianu au Château de Beauvoir, Bourbonnais',
        today:           "C'est aujourd'hui ! ✦",
      }
    };
  </script>
  <script src="main.js"></script>
  <script src="background-animation.js"></script>
</body>
</html>
