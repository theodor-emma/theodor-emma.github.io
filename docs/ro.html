<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salvați Data — Theodor &amp; Emma</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="lang-switcher">
      <a href="index.html">English</a>
      <a href="fr.html">Français</a>
    </div>

    <p class="save-the-date">Rețineți Data</p>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="names">
      Theodor Moroianu
      <span class="ampersand">&amp;</span>
      Emma Chirlomez
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="date-block">
      <p class="date-label">Se căsătoresc pe</p>
      <p class="date">Vineri, 7 august 2027</p>
    </div>

    <div class="venue-block">
      <p class="venue-label">La</p>
      <a class="venue-link" href="https://www.beauvoir-bourbonnais.fr/accs" target="_blank" rel="noopener">
        Château de Beauvoir
      </a>
      <p class="venue-location">Bourbonnais, Franța</p>
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="countdown" id="countdown">
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-days">—</span>
        <span class="countdown-label">Zile</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-hours">—</span>
        <span class="countdown-label">Ore</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-minutes">—</span>
        <span class="countdown-label">Minute</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-seconds">—</span>
        <span class="countdown-label">Secunde</span>
      </div>
    </div>

    <div id="calendar-container"></div>

    <p class="formal-invitation">Invitația oficială urmează.</p>
  </div>

  <script>
    window.WEDDING_CONFIG = {
      labels: {
        addToCalendar:   'Adăugați în calendar',
        googleCalendar:  'Google Calendar',
        appleOutlook:    'Apple / Outlook (.ics)',
        calendarDetails: 'Nunta lui Theodor Moroianu & Emma Chirlomez la Château de Beauvoir, Bourbonnais',
        today:           'Astăzi e ziua ! ✦',
      }
    };
  </script>
  <script src="main.js"></script>
  <script src="background-animation.js"></script>
</body>
</html>
