<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date — Theodor &amp; Emma</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="lang-switcher">
      <a href="fr.html">Français</a>
      <a href="ro.html">Română</a>
    </div>

    <p class="save-the-date">Save the Date</p>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="names">
      Theodor Moroianu
      <span class="ampersand">&amp;</span>
      Emma Chirlomez
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="date-block">
      <p class="date-label">Are getting married on</p>
      <p class="date">Friday, August 7<sup>th</sup>, 2027</p>
    </div>

    <div class="venue-block">
      <p class="venue-label">At</p>
      <a class="venue-link" href="https://www.beauvoir-bourbonnais.fr/accs" target="_blank" rel="noopener">
        Château de Beauvoir
      </a>
      <p class="venue-location">Bourbonnais, France</p>
    </div>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="countdown" id="countdown">
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-days">—</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-hours">—</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-minutes">—</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-unit">
        <span class="countdown-value" id="cd-seconds">—</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <div id="calendar-container"></div>

    <p class="formal-invitation">Formal invitation to follow.</p>
  </div>

  <script>
    window.WEDDING_CONFIG = {
      labels: {
        addToCalendar:   'Add to Calendar',
        googleCalendar:  'Google Calendar',
        appleOutlook:    'Apple / Outlook (.ics)',
        calendarDetails: 'Wedding of Theodor Moroianu & Emma Chirlomez at Château de Beauvoir, Bourbonnais',
        today:           'Today is the day! ✦',
      }
    };
  </script>
  <script src="main.js"></script>
</body>
</html>
